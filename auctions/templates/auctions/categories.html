{% extends "auctions/layout.html" %}

{% block body %}
    <h2>All Categories</h2>

    {% for category_id,category in all_listings.items %}
        <form action="{% url 'category_search' category_id %}" method="post">
            {% csrf_token %}
            <button type="submit" class="link-button">
                {{category}}
            </button>
        </form>
        <br>


    {% endfor %}
    
{% endblock %}
