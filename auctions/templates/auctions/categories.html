{% extends "auctions/layout.html" %}

{% block body %}
    <h2>All Categories</h2>

    {% for category in all_listings %}
        <form action="{% url 'category' category_id }" method="post">
            {% csrf_token %}
            <button type="button" class="link-button">
                {{category.title}}
            </button>
        </form>
        <br>


    {% endfor %}
    
{% endblock %}
